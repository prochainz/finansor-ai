<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Makro Gündem - Finansor AI</title>
    <style>
        body { font-family: 'Inter', -apple-system, sans-serif; background-color: #0f172a; color: #f8fafc; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }
        header { width: 100%; padding: 20px; background-color: #1e293b; text-align: center; border-bottom: 1px solid #334155; }
        header h1 { margin: 0; color: #38bdf8; }
        nav { margin-top: 10px; }
        nav a { color: #94a3b8; text-decoration: none; margin: 0 10px; }
        nav a:hover { color: #f8fafc; }
        .container { max-width: 800px; width: 100%; padding: 40px 20px; }
        .tweet-card { background: #1e293b; padding: 20px; border-radius: 12px; margin-bottom: 20px; border-left: 4px solid #38bdf8; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .tweet-header { display: flex; justify-content: space-between; margin-bottom: 12px; }
        .author { font-weight: bold; color: #f8fafc; }
        .handle { color: #94a3b8; font-size: 0.9em; margin-left: 8px; }
        .sentiment { padding: 4px 8px; border-radius: 4px; font-size: 0.8em; font-weight: bold; }
        .sentiment.positive { background-color: rgba(34, 197, 94, 0.2); color: #4ade80; border: 1px solid rgba(34, 197, 94, 0.4); }
        .sentiment.negative { background-color: rgba(239, 68, 68, 0.2); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.4); }
        .sentiment.neutral { background-color: rgba(148, 163, 184, 0.2); color: #cbd5e1; border: 1px solid rgba(148, 163, 184, 0.4); }
        .content { font-size: 1.1em; line-height: 1.5; margin-bottom: 15px; }
        .stats { display: flex; color: #94a3b8; font-size: 0.9em; }
        .stats div { margin-right: 20px; }
    </style>
</head>
<body>
    <header>
        <h1>Makro Gündem</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="dashboard.html">Dashboard</a>
        </nav>
    </header>
    <div class="container" id="feed">
        <p>Loading market signals...</p>
    </div>

    <script>
        async function loadTweets() {
            try {
                const response = await fetch('data/macro_tweets.json');
                const tweets = await response.json();
                const feed = document.getElementById('feed');
                feed.innerHTML = '';

                tweets.forEach(tweet => {
                    const sentimentClass = tweet.sentiment.toLowerCase();
                    const card = document.createElement('div');
                    card.className = 'tweet-card';
                    card.innerHTML = `
                        <div class="tweet-header">
                            <div>
                                <span class="author">${tweet.author}</span>
                                <span class="handle">${tweet.handle}</span>
                            </div>
                            <span class="sentiment ${sentimentClass}">${tweet.sentiment}</span>
                        </div>
                        <div class="content">${tweet.content}</div>
                        <div class="stats">
                            <div>❤️ ${tweet.likes.toLocaleString()}</div>
                            <div>🔄 ${tweet.retweets.toLocaleString()}</div>
                        </div>
                    `;
                    feed.appendChild(card);
                });
            } catch (error) {
                document.getElementById('feed').innerHTML = '<p>Error loading market data. Please try again later.</p>';
                console.error('Error fetching data:', error);
            }
        }

        loadTweets();
    </script>
</body>
</html>
